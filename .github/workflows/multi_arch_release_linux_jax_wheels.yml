name: Multi-Arch Release Linux JAX Wheels

on:
  workflow_dispatch:
    inputs:
      test_amdgpu_family:
        description: "GPU family to use for JAX tests; empty means skip tests."
        type: string
        default: ""
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease".'
        type: string
        required: true
      rocm_version:
        description: ROCm package version to build against.
        type: string
        required: true
      tar_url:
        description: URL to the shared TheRock tarball used for the build.
        type: string
        required: true
      ref:
        description: Branch, tag, or SHA to checkout.
        type: string
        default: ""
      repository:
        description: "Repository to checkout. Defaults to ROCm/TheRock."
        type: string
        default: "ROCm/TheRock"

permissions:
  contents: read
  id-token: write

run-name: Multi-Arch Release Linux JAX Wheels (${{ inputs.release_type }}, ${{ inputs.rocm_version }}, Multiarch)

jobs:
  build_jax_wheels:
    uses: ROCm/TheRock/.github/workflows/multi_arch_release_linux_jax_wheels.yml@users/erman-gurses/fix-jax-workflow-permissions
    secrets: inherit
    with:
      test_amdgpu_family: ${{ inputs.test_amdgpu_family }}
      release_type: ${{ inputs.release_type }}
      rocm_version: ${{ inputs.rocm_version }}
      tar_url: ${{ inputs.tar_url }}
      repository: ${{ inputs.repository || 'ROCm/TheRock' }}
      ref: ${{ inputs.ref || '' }}
