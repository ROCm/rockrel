name: Multi-Arch Repackage Windows

on:
  workflow_call:
    inputs:
      release_type:
        type: string
        required: true
      prerelease_version:
        type: string
        default: ""
      prebuilt_prefix:
        type: string
        required: true
      amdgpu_families:
        type: string
        required: true
      ref:
        type: string
        default: ""

permissions:
  contents: read

jobs:
  noop:
    name: Repackage Windows (dummy)
    runs-on: ubuntu-24.04
    steps:
      - name: Show inputs
        run: |
          echo "release_type=${{ inputs.release_type }}"
          echo "prerelease_version=${{ inputs.prerelease_version }}"
          echo "prebuilt_prefix=${{ inputs.prebuilt_prefix }}"
          echo "amdgpu_families=${{ inputs.amdgpu_families }}"
          echo "ref=${{ inputs.ref }}"
